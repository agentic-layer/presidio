name: Check
on:
  push:
    branches:
      - main
      - 'renovate/**'
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: make test

  e2e-test:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start service and wait for healthy
        run: docker compose up --build --wait

      - name: E2E Test
        run: make e2e-test

      - name: Stop service
        if: always()
        run: docker compose down
