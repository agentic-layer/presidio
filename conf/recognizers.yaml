supported_languages:
  - en
  - de
global_regex_flags: 26

recognizers:
  - name: SpacyRecognizer
    supported_languages:
      - en
      - de
    type: predefined

  - name: CreditCardRecognizer
    supported_languages:
      - language: en
        context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
      - language: de
        context: [kreditkarte, karte, visa, mastercard, cc, amex, discover, jcb, diners, maestro]
    type: predefined

  - name: CryptoRecognizer
    type: predefined

  - name: DateRecognizer
    type: predefined

  - name: EmailRecognizer
    type: predefined

  - name: IbanRecognizer
    type: predefined

  - name: IpRecognizer
    type: predefined

  - name: MedicalLicenseRecognizer
    type: predefined

  - name: MacAddressRecognizer
    type: predefined

  - name: PhoneRecognizer
    type: predefined

  - name: UrlRecognizer
    type: predefined

  - name: UsBankRecognizer
    supported_languages:
      - en
    type: predefined

  - name: UsLicenseRecognizer
    supported_languages:
      - en
    type: predefined

  - name: UsItinRecognizer
    supported_languages:
      - en
    type: predefined

  - name: UsPassportRecognizer
    supported_languages:
      - en
    type: predefined

  - name: UsSsnRecognizer
    supported_languages:
      - en
    type: predefined

  - name: NhsRecognizer
    supported_languages:
      - en
    type: predefined
